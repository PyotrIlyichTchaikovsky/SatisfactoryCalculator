<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satisfactory Production Planner</title>
  <link rel="stylesheet" href="production_planner.css?v=material-icons-20260612-1">
  <script defer src="production_planner.js?v=material-icons-20260612-1"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Satisfactory Production Planner</h1>
      <p id="dataSummary">Connecting to production planner service...</p>
    </div>
  </header>

  <main class="app-shell">
    <section class="input-panel" aria-labelledby="targetHeading">
      <div class="panel-title-row">
        <h2 id="targetHeading">Production Targets</h2>
        <div class="panel-actions">
          <button id="recipeFilterButton" class="secondary-button" type="button">Recipe Filter</button>
          <button id="addTargetButton" class="secondary-button" type="button">Add Item</button>
        </div>
      </div>

      <form id="plannerForm" autocomplete="off">
        <div id="targetRows" class="target-rows"></div>
        <div class="form-actions">
          <button class="primary-button" type="submit">Calculate</button>
        </div>
      </form>
    </section>

    <section class="result-panel" aria-labelledby="resultHeading">
      <div class="result-toolbar">
        <h2 id="resultHeading">Results</h2>
        <div class="result-actions">
          <button id="resetLayoutButton" class="secondary-button compact-button" type="button">Reset Layout</button>
          <div class="tabs" role="tablist" aria-label="Result views">
            <button class="tab-button active" type="button" data-tab="tree" role="tab" aria-selected="true">Plan View</button>
            <button class="tab-button" type="button" data-tab="table" role="tab" aria-selected="false">Merged Table</button>
          </div>
        </div>
      </div>

      <div id="statusMessage" class="status-message">Select one or more items and enter the required production rate per minute.</div>
      <div id="treeView" class="view-panel"></div>
      <div id="tableView" class="view-panel hidden"></div>
    </section>
  </main>

  <template id="targetRowTemplate">
    <div class="target-row">
      <div class="field item-field">
        <label>Item</label>
        <div class="item-input-box">
          <span class="target-item-icon empty" aria-hidden="true"></span>
          <input class="item-input" type="text" placeholder="AI Limiter">
        </div>
        <div class="suggestions" role="listbox"></div>
      </div>
      <div class="field amount-field">
        <label>Rate per Minute</label>
        <div class="amount-box">
          <input class="amount-input" type="number" min="0" step="0.001" placeholder="60">
          <span class="unit-label">/ min</span>
        </div>
      </div>
      <button class="remove-button" type="button" title="Remove item" aria-label="Remove item">Remove</button>
    </div>
  </template>
</body>
</html>
